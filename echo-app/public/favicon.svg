<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0A1420"/>
  <!-- concentric radar rings -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#2BB3C7" stroke-opacity="0.30" stroke-width="1.2"/>
  <circle cx="16" cy="16" r="7.5" fill="none" stroke="#2BB3C7" stroke-opacity="0.55" stroke-width="1.4"/>
  <circle cx="16" cy="16" r="4" fill="none" stroke="#57D2E2" stroke-width="1.6"/>
  <!-- radar sweep arc -->
  <path d="M16 16 L16 5 A11 11 0 0 1 26 14 Z" fill="#2BB3C7" fill-opacity="0.18"/>
  <!-- warm blip — the caught signal -->
  <circle cx="22" cy="11" r="2.4" fill="#FF4D5E"/>
  <circle cx="22" cy="11" r="2.4" fill="none" stroke="#FF7A87" stroke-width="0.8"/>
</svg>
