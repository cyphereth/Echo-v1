<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg-base:#0F1E2E; --surface-1:#1C3349; --surface-3:#2F4E6B; --line-2:#314A64;
    --fg-1:#EAF1F8; --fg-3:#5C6E83; --brand:#2BB3C7; --brand-line:rgba(43,179,199,0.32);
    --font-sans:'Manrope',sans-serif; --font-mono:'JetBrains Mono',monospace; --r-lg:14px; }
  body { margin:0; width:700px; padding:24px; background:var(--bg-base); display:flex; gap:14px; font-family:var(--font-sans); }
  .cell { flex:1; border:1px solid var(--line-2); border-radius:var(--r-lg); background:var(--surface-1); padding:16px 14px; display:flex; flex-direction:column; align-items:center; gap:10px; text-align:center; }
  .mk { width:46px; height:46px; border-radius:12px; display:grid; place-items:center; border:1px solid var(--line-2); }
  .mk svg { width:24px; height:24px; }
  .tt { font-family:var(--font-mono); font-weight:700; font-size:17px; color:#EAF1F8; }
  .nm { font-size:13px; font-weight:700; color:var(--fg-1); }
  .st { font-family:var(--font-mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; padding:3px 8px; border-radius:999px; }
  .v1 { color:var(--brand); background:rgba(43,179,199,0.12); border:1px solid var(--brand-line); }
  .soon { color:var(--fg-3); background:var(--surface-3); border:1px solid var(--line-2); }
</style>
</head>
<body>
  <div class="cell">
    <div class="mk" style="background:rgba(225,48,108,0.12);border-color:rgba(225,48,108,0.4)">
      <svg viewBox="0 0 24 24" fill="none" stroke="#E1306C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
    </div>
    <span class="nm">Instagram</span><span class="st v1">v1 · в эфире</span>
  </div>
  <div class="cell">
    <div class="mk" style="background:#0A1420">
      <svg viewBox="0 0 24 24" fill="#EAF1F8"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg>
    </div>
    <span class="nm">TikTok</span><span class="st v1">v1 · в эфире</span>
  </div>
  <div class="cell">
    <div class="mk" style="background:#0A1420">
      <svg viewBox="0 0 24 24" fill="#EAF1F8"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    </div>
    <span class="nm">Twitter / X</span><span class="st soon">скоро</span>
  </div>
  <div class="cell">
    <div class="mk" style="background:rgba(41,169,235,0.14);border-color:rgba(41,169,235,0.4)">
      <svg viewBox="0 0 24 24" fill="#29A9EB"><path d="M21.94 4.76 18.9 19.06c-.23 1.01-.83 1.26-1.68.79l-4.64-3.42-2.24 2.16c-.25.25-.46.46-.94.46l.33-4.77 8.67-7.83c.38-.34-.08-.53-.59-.19L6.83 13.2l-4.62-1.44c-1-.32-1.02-1 .21-1.48l18.05-6.96c.84-.31 1.57.2 1.47 1.44z"/></svg>
    </div>
    <span class="nm">Telegram</span><span class="st soon">скоро</span>
  </div>
</body>
</html>
