<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --bg-base:#0F1E2E; --surface-1:#1C3349; --surface-3:#2F4E6B; --line-2:#314A64;
    --fg-3:#5C6E83; --brand-bright:#57D2E2; --font-sans:'Manrope',sans-serif; --font-mono:'JetBrains Mono',monospace; --r-lg:14px; }
  body { margin:0; width:700px; padding:26px; background:var(--bg-base); display:flex; gap:18px; font-family:var(--font-sans); }
  .cell { flex:1; border-radius:var(--r-lg); border:1px solid var(--line-2); background:var(--surface-1); padding:18px; display:flex; flex-direction:column; align-items:center; gap:13px; }
  .gauge { position:relative; width:108px; height:108px; border-radius:50%; display:grid; place-items:center;
    background: conic-gradient(var(--c) calc(var(--v)*1%), var(--surface-3) 0); }
  .gauge::before { content:""; position:absolute; width:82px; height:82px; border-radius:50%; background:var(--surface-1); box-shadow: inset 0 0 0 1px var(--line-2); }
  .num { position:relative; font-family:var(--font-mono); font-weight:700; font-size:30px; font-variant-numeric:tabular-nums; line-height:1; }
  .cap { font-family:var(--font-mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--fg-3); }
  .lbl { font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; font-weight:600; }
</style>
</head>
<body>
  <div class="cell"><div class="gauge" style="--c:#FF4D5E;--v:87"><span class="num" style="color:#FF7A87">87</span></div><span class="cap">Severity</span><span class="lbl" style="color:#FF7A87">Залетает · PR</span></div>
  <div class="cell"><div class="gauge" style="--c:#FFB23E;--v:54"><span class="num" style="color:#FFC871">54</span></div><span class="cap">Severity</span><span class="lbl" style="color:#FFC871">Растёт · следим</span></div>
  <div class="cell"><div class="gauge" style="--c:#2BB3C7;--v:21"><span class="num" style="color:var(--brand-bright)">21</span></div><span class="cap">Severity</span><span class="lbl" style="color:var(--brand-bright)">Под контролем</span></div>
</body>
</html>
