<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Echo Radar — диспетчерский инбокс</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ============================================================================
   ECHO RADAR — Foundations: Color + Type
   ----------------------------------------------------------------------------
   Mood: «спокойный диспетчерский центр». Тёмный сине-графитовый фон, холодный
   циан как акцент бренда. Спокойствие как фон, срочность как точка — только
   сигналы severity вспыхивают тёплым: алый «залетает», янтарный «растёт».

   Fonts loaded from Google Fonts CDN (both ship full Cyrillic):
     - Manrope        → UI, headings, body
     - JetBrains Mono → data, metrics, severity, timestamps, eyebrows
   NOTE: not bundled locally. See README → Caveats if you need offline files.
   ============================================================================ */



:root {
  /* ---- Type families ---- */
  --font-sans: 'Manrope', system-ui, -apple-system, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* ====================================================================
     COLOR — Backgrounds (graphite navy, cold + desaturated)
     ==================================================================== */
  --bg-void:    #0A1420;  /* deepest backdrop, behind panels */
  --bg-base:    #0F1E2E;  /* app canvas */
  --bg-raised:  #16293B;  /* large panels / sidebars */
  --surface-1:  #1C3349;  /* cards */
  --surface-2:  #244059;  /* raised cards, inputs */
  --surface-3:  #2F4E6B;  /* hover, pressed surfaces */

  /* ---- Hairlines / borders ---- */
  --line-1:      #243A50;  /* subtle dividers */
  --line-2:      #314A64;  /* card borders */
  --line-strong: #42607E;  /* emphasized borders */

  /* ====================================================================
     COLOR — Text (cool whites → dim)
     ==================================================================== */
  --fg-1: #EAF1F8;  /* primary */
  --fg-2: #97A9BE;  /* secondary */
  --fg-3: #5C6E83;  /* tertiary, dim labels */
  --fg-on-brand: #04141A;  /* ink on cyan */
  --fg-on-warm:  #1A0A09;  /* ink on amber/crimson fills */

  /* ====================================================================
     COLOR — Brand (cold cyan = "всё под контролем", radar signal)
     ==================================================================== */
  --brand:        #2BB3C7;
  --brand-bright: #57D2E2;
  --brand-deep:   #15788A;
  --brand-ghost:  rgba(43,179,199,0.12);
  --brand-line:   rgba(43,179,199,0.32);

  /* ====================================================================
     COLOR — Severity (warm urgency — the "точка" against calm)
     ==================================================================== */
  --sev-critical:        #FF4D5E;  /* «залетает» — crimson */
  --sev-critical-bright: #FF7A87;
  --sev-critical-ghost:  rgba(255,77,94,0.14);
  --sev-critical-line:   rgba(255,77,94,0.38);

  --sev-rising:        #FFB23E;    /* «растёт» — amber */
  --sev-rising-bright: #FFC871;
  --sev-rising-ghost:  rgba(255,178,62,0.14);
  --sev-rising-line:   rgba(255,178,62,0.36);

  --sev-calm:        #34D8A0;       /* «под контролем» / позитив — used sparingly */
  --sev-calm-ghost:  rgba(52,216,160,0.13);
  --sev-calm-line:   rgba(52,216,160,0.34);

  /* ---- Tonality (sentiment) ---- */
  --tone-negative: var(--sev-critical);
  --tone-neutral:  #7E91A6;
  --tone-positive: var(--sev-calm);

  /* ---- Platform marks ---- */
  --pf-instagram: #E1306C;
  --pf-tiktok:    #EAF1F8;

  /* ====================================================================
     RADII
     ==================================================================== */
  --r-xs:   4px;
  --r-sm:   6px;
  --r-md:  10px;
  --r-lg:  14px;
  --r-xl:  20px;
  --r-pill: 999px;

  /* ====================================================================
     SPACING (4px base)
     ==================================================================== */
  --s-1:  4px;
  --s-2:  8px;
  --s-3:  12px;
  --s-4:  16px;
  --s-5:  20px;
  --s-6:  24px;
  --s-8:  32px;
  --s-10: 40px;
  --s-12: 48px;
  --s-16: 64px;
  --s-20: 80px;

  /* ====================================================================
     ELEVATION — shadows on dark + signal glows
     ==================================================================== */
  --shadow-1: 0 1px 2px rgba(0,0,0,0.45);
  --shadow-2: 0 6px 20px -6px rgba(0,0,0,0.55);
  --shadow-3: 0 22px 54px -16px rgba(0,0,0,0.70);

  /* glows = a calm radar pulse or a warm severity flare */
  --glow-brand:    0 0 0 1px var(--brand-line),        0 0 26px -6px rgba(43,179,199,0.50);
  --glow-critical: 0 0 0 1px var(--sev-critical-line),  0 0 24px -4px rgba(255,77,94,0.55);
  --glow-rising:   0 0 0 1px var(--sev-rising-line),    0 0 24px -6px rgba(255,178,62,0.45);

  /* ====================================================================
     MOTION
     ==================================================================== */
  --ease-out:  cubic-bezier(0.22, 1, 0.36, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --dur-fast: 120ms;
  --dur-mid:  220ms;
  --dur-slow: 420ms;

  /* ====================================================================
     TYPE SCALE  (sizes / line-heights / tracking)
     ==================================================================== */
  --display:    700 44px/1.04 var(--font-sans);   --display-ls: -0.022em;
  --h1:         800 34px/1.08 var(--font-sans);   --h1-ls: -0.02em;
  --h2:         700 26px/1.14 var(--font-sans);   --h2-ls: -0.016em;
  --h3:         700 20px/1.22 var(--font-sans);   --h3-ls: -0.012em;
  --h4:         600 16px/1.30 var(--font-sans);   --h4-ls: -0.006em;
  --body-lg:    500 17px/1.55 var(--font-sans);
  --body:       500 15px/1.55 var(--font-sans);
  --small:      500 13px/1.5  var(--font-sans);
  --eyebrow:    600 12px/1.1  var(--font-mono);   --eyebrow-ls: 0.16em;
  --metric:     600 15px/1    var(--font-mono);
  --metric-lg:  600 28px/1    var(--font-mono);   --metric-lg-ls: -0.01em;
  --mono-sm:    500 12px/1.4  var(--font-mono);
}

/* ============================================================================
   SEMANTIC HELPERS — apply directly as classes
   ============================================================================ */
.echo-display { font: var(--display); letter-spacing: var(--display-ls); color: var(--fg-1); }
.echo-h1 { font: var(--h1); letter-spacing: var(--h1-ls); color: var(--fg-1); }
.echo-h2 { font: var(--h2); letter-spacing: var(--h2-ls); color: var(--fg-1); }
.echo-h3 { font: var(--h3); letter-spacing: var(--h3-ls); color: var(--fg-1); }
.echo-h4 { font: var(--h4); letter-spacing: var(--h4-ls); color: var(--fg-1); }
.echo-body-lg { font: var(--body-lg); color: var(--fg-2); }
.echo-body { font: var(--body); color: var(--fg-2); }
.echo-small { font: var(--small); color: var(--fg-3); }

/* eyebrow / label — mono, uppercase, tracked-out: the instrument-panel voice */
.echo-eyebrow {
  font: var(--eyebrow);
  letter-spacing: var(--eyebrow-ls);
  text-transform: uppercase;
  color: var(--fg-3);
}

/* metric — mono tabular numerals for scores, counts, timestamps */
.echo-metric { font: var(--metric); font-variant-numeric: tabular-nums; color: var(--fg-1); }
.echo-metric-lg { font: var(--metric-lg); letter-spacing: var(--metric-lg-ls); font-variant-numeric: tabular-nums; color: var(--fg-1); }

/* ============================================================================
   BASE (optional reset — opt in by adding class "echo" to <body>)
   ============================================================================ */
.echo {
  background: var(--bg-base);
  color: var(--fg-2);
  font: var(--body);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
.echo *,
.echo *::before,
.echo *::after { box-sizing: border-box; }
/* ============================================================================
   Echo Radar — App UI kit · styles (consumes tokens from colors_and_type.css)
   ============================================================================ */
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body { background: var(--bg-void); color: var(--fg-2); font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased; overflow: hidden; }
#root { height: 100vh; }
button { font-family: inherit; }
::-webkit-scrollbar { width: 9px; height: 9px; }
::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: var(--line-strong); background-clip: padding-box; }

.er-app { display: grid; grid-template-columns: 232px 1fr; height: 100vh; }

/* ---- Sidebar ---- */
.er-sidebar { background: var(--bg-raised); border-right: 1px solid var(--line-1); display: flex; flex-direction: column; min-height: 0; }
.er-nav { display: flex; align-items: center; gap: 11px; width: 100%; padding: 9px 12px; border: none;
  background: transparent; color: var(--fg-2); font-size: 14px; font-weight: 600; border-radius: var(--r-md);
  cursor: pointer; transition: background var(--dur-fast), color var(--dur-fast); }
.er-nav:hover { background: var(--surface-1); color: var(--fg-1); }
.er-nav[data-active="1"] { background: var(--brand-ghost); color: var(--brand-bright); box-shadow: inset 0 0 0 1px var(--brand-line); }
.er-nav-badge { font-family: var(--font-mono); font-size: 11px; font-weight: 700; background: var(--sev-critical); color: #fff; min-width: 20px; height: 20px; padding: 0 6px; border-radius: 999px; display: grid; place-items: center; }
.er-status { display: flex; align-items: center; gap: 10px; padding: 11px 12px; background: var(--surface-1); border: 1px solid var(--line-2); border-radius: var(--r-md); margin-bottom: 10px; }
.er-pulse { width: 9px; height: 9px; border-radius: 999px; background: var(--sev-calm); box-shadow: 0 0 0 0 var(--sev-calm-line); animation: erpulse 2.4s var(--ease-out) infinite; flex: none; }
@keyframes erpulse { 0% { box-shadow: 0 0 0 0 rgba(52,216,160,.5); } 70% { box-shadow: 0 0 0 7px rgba(52,216,160,0); } 100% { box-shadow: 0 0 0 0 rgba(52,216,160,0); } }
.er-account { display: flex; align-items: center; gap: 10px; padding: 8px 6px; }

/* ---- Main / topbar ---- */
.er-main { display: flex; flex-direction: column; min-width: 0; min-height: 0; background: var(--bg-base); }
.er-topbar { display: flex; align-items: center; gap: 16px; height: 60px; padding: 0 18px; border-bottom: 1px solid var(--line-1); flex: none; }
.er-brandsel { display: flex; align-items: center; gap: 10px; background: var(--surface-1); border: 1px solid var(--line-2); border-radius: var(--r-md); padding: 6px 12px 6px 7px; cursor: pointer; white-space: nowrap; flex: none; }
.er-brandsel:hover { border-color: var(--line-strong); }
.er-monogram { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--brand-deep), #123); color: var(--brand-bright); font-family: var(--font-mono); font-weight: 700; font-size: 13px; display: grid; place-items: center; flex: none; }
.er-topgrow { flex: 1; white-space: nowrap; min-width: 0; }
.er-search { display: flex; align-items: center; gap: 9px; background: var(--surface-1); border: 1px solid var(--line-2); border-radius: var(--r-md); padding: 9px 14px; width: 280px; white-space: nowrap; flex: none; }
.er-icbtn { position: relative; width: 38px; height: 38px; border-radius: var(--r-md); border: 1px solid var(--line-2); background: var(--surface-1); display: grid; place-items: center; cursor: pointer; }
.er-icbtn:hover { border-color: var(--line-strong); background: var(--surface-2); }
.er-bell-dot { position: absolute; top: 9px; right: 10px; width: 7px; height: 7px; border-radius: 999px; background: var(--sev-critical); box-shadow: 0 0 0 2px var(--surface-1); }

/* ---- Scope bar ---- */
.er-scope { display: flex; align-items: center; gap: 18px; height: 46px; padding: 0 22px; border-bottom: 1px solid var(--line-1); background: var(--bg-raised); flex: none; }
.er-scope-live { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; font-weight: 600; color: var(--sev-calm); }
.er-scope-div { width: 1px; height: 18px; background: var(--line-2); }

/* ---- Workspace ---- */
.er-workspace { flex: 1; display: flex; min-height: 0; }
.er-inbox { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px 18px; min-width: 0; overflow: hidden; }
.er-lane-col { display: flex; flex-direction: column; min-height: 0; }
.er-lane-head { display: flex; align-items: center; justify-content: space-between; padding: 2px 4px 12px; }
.er-count { font-family: var(--font-mono); font-size: 12px; font-weight: 700; background: var(--surface-2); padding: 2px 8px; border-radius: 999px; }
.er-lane-list { display: flex; flex-direction: column; gap: 11px; overflow-y: auto; padding: 2px 4px 16px; flex: 1; }
.er-empty { font-family: var(--font-mono); font-size: 12.5px; color: var(--fg-3); text-align: center; padding: 30px; }

/* ---- Mention row ---- */
.er-row { text-align: left; width: 100%; background: var(--surface-1); border: 1px solid var(--line-2);
  border-left: 3px solid var(--line-strong); border-radius: var(--r-lg); padding: 13px 14px; cursor: pointer;
  display: flex; flex-direction: column; gap: 10px; transition: background var(--dur-fast), border-color var(--dur-fast), transform var(--dur-fast); }
.er-row:hover { background: var(--surface-2); }
.er-row[data-selected="1"] { background: var(--surface-2); box-shadow: 0 0 0 1px var(--brand-line), var(--shadow-2); }
.er-row-top { display: flex; align-items: center; gap: 11px; }
.er-row-text { font-size: 13.5px; line-height: 1.5; color: var(--fg-1); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.er-row-foot { display: flex; align-items: center; gap: 12px; }
.er-flag { display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-mono); font-size: 11px; font-weight: 600; }
.er-dot-live { width: 7px; height: 7px; border-radius: 999px; background: var(--brand); display: inline-block; }
.er-humor { display: inline-flex; align-items: center; gap: 4px; font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .04em; color: var(--sev-rising); background: var(--sev-rising-ghost); border: 1px solid var(--sev-rising-line); padding: 3px 7px; border-radius: 999px; }
.er-human { width: 46px; height: 46px; border-radius: 50%; border: 1px dashed var(--line-strong); display: grid; place-items: center; flex: none; }

/* ---- Detail ---- */
.er-detail { width: 446px; flex: none; border-left: 1px solid var(--line-1); background: var(--bg-raised); display: flex; flex-direction: column; min-height: 0; }
.er-detail-scroll { flex: 1; overflow-y: auto; padding: 20px; }
.er-detail-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.er-quote { margin: 0 0 16px; font-size: 15px; line-height: 1.55; color: var(--fg-1); padding: 14px 16px; background: var(--surface-1); border: 1px solid var(--line-2); border-left: 3px solid var(--brand-line); border-radius: var(--r-md); }
.er-meta-row { display: flex; gap: 10px; margin-bottom: 16px; }
.er-score { flex: 1; background: var(--surface-1); border: 1px solid var(--line-2); border-radius: var(--r-md); padding: 9px 12px; display: flex; flex-direction: column; gap: 5px; min-width: 0; }
.er-score span:last-child { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.er-snap { background: var(--surface-1); border: 1px solid var(--line-2); border-radius: var(--r-lg); padding: 14px 16px; margin-bottom: 16px; }
.er-snap-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.er-snap-foot { display: flex; gap: 10px; margin-top: 12px; }
.er-draft { background: var(--surface-1); border: 1px solid var(--line-2); border-radius: var(--r-lg); padding: 14px 16px; }
.er-draft-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.er-draft-body { margin: 0; font-size: 14px; line-height: 1.6; color: var(--fg-2); }
.er-textarea { width: 100%; background: var(--bg-base); border: 1px solid var(--brand-line); border-radius: var(--r-md); padding: 11px 13px; color: var(--fg-1); font-family: var(--font-sans); font-size: 14px; line-height: 1.6; resize: vertical; outline: none; box-shadow: 0 0 0 3px var(--brand-ghost); }
.er-gate { display: flex; gap: 12px; background: var(--sev-rising-ghost); border: 1px solid var(--sev-rising-line); border-radius: var(--r-lg); padding: 14px 16px; }
.er-tg { margin-top: 12px; border-top: 1px solid var(--line-1); padding-top: 12px; }
.er-tg-toggle { display: flex; align-items: center; gap: 9px; width: 100%; background: transparent; border: none; cursor: pointer; color: var(--fg-2); font-size: 13px; font-weight: 600; padding: 2px; }
.er-tg-card { margin-top: 10px; background: var(--bg-base); border: 1px solid var(--line-2); border-radius: var(--r-md); padding: 12px 14px; }
.er-actions { display: flex; gap: 10px; padding: 14px 18px; border-top: 1px solid var(--line-1); background: var(--bg-raised); flex: none; }
.er-sent { display: flex; align-items: center; gap: 9px; width: 100%; justify-content: center; font-size: 13.5px; font-weight: 600; color: var(--sev-calm); padding: 8px; }

/* ---- Probes ---- */
.er-probes { flex: 1; overflow-y: auto; padding: 22px; display: flex; flex-direction: column; gap: 18px; max-width: 920px; width: 100%; margin: 0 auto; }
.er-onb { background: var(--surface-1); border: 1px solid var(--line-2); border-radius: var(--r-xl); padding: 20px; }
.er-onb-ic { width: 34px; height: 34px; border-radius: 9px; background: var(--brand-ghost); border: 1px solid var(--brand-line); display: grid; place-items: center; flex: none; }
.er-onb-input { display: flex; align-items: center; gap: 10px; background: var(--bg-base); border: 1px solid var(--line-2); border-radius: var(--r-md); padding: 7px 7px 7px 13px; }
.er-chip-ai { display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-mono); font-size: 12.5px; color: var(--brand-bright); background: var(--brand-ghost); border: 1px solid var(--brand-line); border-radius: 999px; padding: 6px 12px; cursor: pointer; white-space: nowrap; }
.er-chip-ai[data-added="1"] { color: var(--sev-calm); background: var(--sev-calm-ghost); border-color: var(--sev-calm-line); }
.er-probe-list { background: var(--surface-1); border: 1px solid var(--line-2); border-radius: var(--r-xl); overflow: hidden; }
.er-probe-listhead { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid var(--line-1); }
.er-probe-row { display: flex; align-items: center; gap: 14px; padding: 13px 18px; border-bottom: 1px solid var(--line-1); }
.er-probe-row:last-child { border-bottom: none; }
.er-probe-row:hover { background: var(--surface-2); }
.er-probe-kind { font-family: var(--font-mono); font-size: 10px; letter-spacing: .06em; text-transform: uppercase; color: var(--fg-3); background: var(--surface-2); border: 1px solid var(--line-2); border-radius: 999px; padding: 4px 9px; width: 128px; text-align: center; flex: none; white-space: nowrap; }
.er-probe-int { display: inline-flex; align-items: center; gap: 6px; width: 86px; }
.er-probe-last { display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-mono); font-size: 11.5px; color: var(--fg-2); width: 84px; }

/* ---- Toast ---- */
.er-toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 10px;
  background: var(--surface-2); border: 1px solid var(--line-strong); border-radius: var(--r-md); padding: 12px 18px;
  font-size: 13.5px; font-weight: 600; color: var(--fg-1); box-shadow: var(--shadow-3); animation: ertoast .3s var(--ease-out); z-index: 50; }
@keyframes ertoast { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }

.er-btn:hover { filter: brightness(1.08); }
.er-btn:active { transform: scale(.98); }

</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

/* ===== data ===== */
// ============================================================================
// Echo Radar — App UI kit · demo data
// One account per brand (v1). Monitored brand: «Папа Пицца» (доставка еды).
// Mentions carry severity (virality 0–100), phase, tone, confidence, lane, draft.
// ============================================================================

const BRAND = { name: 'Папа Пицца', handle: '@papapizza', monogram: 'ПП', probes: 4 };

// severity → warm signal color + russian label
function sevTone(s) {
  if (s >= 75) return { key: 'critical', color: '#FF4D5E', bright: '#FF7A87', ghost: 'rgba(255,77,94,.14)', line: 'rgba(255,77,94,.38)', label: 'Залетает' };
  if (s >= 45) return { key: 'rising',   color: '#FFB23E', bright: '#FFC871', ghost: 'rgba(255,178,62,.14)', line: 'rgba(255,178,62,.36)', label: 'Растёт' };
  return { key: 'calm', color: '#2BB3C7', bright: '#57D2E2', ghost: 'rgba(43,179,199,.12)', line: 'rgba(43,179,199,.32)', label: 'Под контролем' };

// Ring gauge — full track + colored progress arc (unmistakably a meter)
function SeverityRing({ value, size = 76, stroke = 8, tone }) {
  const t = tone || sevTone(value);
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const off = c * (1 - value / 100);
  return (
    <span style={{ position: 'relative', width: size, height: size, flex: 'none', display: 'inline-grid', placeItems: 'center' }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--surface-3)" strokeWidth={stroke} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={t.color} strokeWidth={stroke}
          strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off}
          style={{ transition: 'stroke-dashoffset .6s var(--ease-out)' }} />
      </svg>
      <span style={{ position: 'absolute', fontFamily: 'var(--font-mono)', fontWeight: 700,
        fontSize: size * 0.32, color: t.bright, fontVariantNumeric: 'tabular-nums' }}>{value}</span>
    </span>
  );
}

// Sparkline of the snapshot series, tinted by phase
function Sparkline({ data, color = '#FFB23E', w = 96, h = 30 }) {
  const max = Math.max(...data), min = Math.min(...data);
  const span = max - min || 1;
  const pts = data.map((v, i) => [ (i / (data.length - 1)) * w, h - 3 - ((v - min) / span) * (h - 6) ]);
  const line = pts.map(p => p.join(',')).join(' ');
  const area = `0,${h} ${line} ${w},${h}`;
  const gid = 'spk' + Math.round(color.charCodeAt(1) * 99 + w);
  return (
    <svg width={w} height={h} style={{ display: 'block' }}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stopColor={color} stopOpacity="0.28" /><stop offset="1" stopColor={color} stopOpacity="0" />
      </linearGradient></defs>
      <polygon points={area} fill={`url(#${gid})`} />
      <polyline points={line} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="2.6" fill={color} />
    </svg>
  );
}

}

}

function StatusFlag({ status }) {

  return <span className="er-flag" style={{ color: 'var(--brand-bright)' }}><span className="er-dot-live" />Новое</span>;

function MentionRow({ m, selected, onClick }) {

  const phase = PHASE[m.phase];

        </div>
        {m.lane === 'none'
          ? <span className="er-human"><Icon name="eye" size={16} color="var(--fg-3)" /></span>

function ScopeBar({ data }) {
  const live = data.filter(m => m.status === 'new').length;
  const crit = data.filter(m => m.severity >= 75 && m.status === 'new').length;
  const rise = data.filter(m => m.severity >= 45 && m.severity < 75 && m.status === 'new').length;
  const Stat = ({ label, value, color }) => (
    <span style={{ display: 'inline-flex', alignItems: 'baseline', gap: 7 }}>
      <span style={{ fontFamily: 'var(--font-mono)', fontWeight: 700, fontSize: 16, color, fontVariantNumeric: 'tabular-nums' }}>{value}</span>
      <Eyebrow>{label}</Eyebrow>
    </span>
  );
  return (
    <div className="er-scope">
      <span className="er-scope-live"><span className="er-pulse" />В эфире</span>
      <span className="er-scope-div" />
      <Stat label="сигналов" value={live} color="var(--fg-1)" />
      <Stat label="залетает" value={crit} color="#FF7A87" />
      <Stat label="растёт" value={rise} color="#FFC871" />
      <span style={{ marginLeft: 'auto', fontFamily: 'var(--font-mono)', fontSize: 11.5, color: 'var(--fg-3)' }}>
        синхронизация 12 сек назад
      </span>
    </div>
  );
}

function App() {
  const [screen, setScreen] = React.useState('inbox');
  const [data, setData] = React.useState(DATA);
  const [selectedId, setSelectedId] = React.useState('m1');
  const [toast, setToast] = React.useState(null);

  const visible = data.filter(m => m.status !== 'rejected');
  const selected = data.find(m => m.id === selectedId);
  const prCount = data.filter(m => (m.lane === 'PR' || m.lane === 'none') && m.status === 'new').length;

  function flash(msg) { setToast(msg); clearTimeout(window.__erT); window.__erT = setTimeout(() => setToast(null), 2600); }

  function onAction(id, action) {
    setData(d => d.map(m => {
      if (m.id !== id) return m;
      if (action === 'approve') return { ...m, status: 'sent' };
      if (action === 'reject')  return { ...m, status: 'rejected' };
      if (action === 'pr')      return { ...m, lane: 'PR', status: 'new', humor: false };
      return m;
    }));
    if (action === 'approve') flash('Ответ отправлен · правка залогирована для tone-learning');
    if (action === 'reject')  { flash('Отклонено как шум'); const next = visible.find(m => m.id !== id); if (next) setSelectedId(next.id); }
    if (action === 'pr')      flash('Передано в PR — срочно');
  }

  return (
    <div className="er-app">
      <Sidebar screen={screen} setScreen={setScreen} prCount={prCount} />
      <div className="er-main">
        <TopBar
          title={screen === 'inbox' ? 'Инбокс' : 'Зонды'}
          sub={screen === 'inbox' ? 'две полосы · PR и SMM' : 'ключевые слова и хэштеги, по которым ищем упоминания'} />
        {screen === 'inbox' ? (
          <>
            <ScopeBar data={data} />
            <div className="er-workspace">
              <Inbox data={visible} selectedId={selectedId} onSelect={setSelectedId} />
              {selected
                ? <DetailPanel m={selected} onAction={onAction} />
                : <aside className="er-detail"><div className="er-empty" style={{ margin: 'auto' }}>Выберите упоминание</div></aside>}
            </div>
          </>
        ) : <ProbesScreen />}
      </div>
      {toast && <div className="er-toast"><Icon name="check" size={15} color="var(--sev-calm)" />{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);


</script>
</body>
</html>
