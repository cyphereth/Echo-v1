<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Echo Radar — лендинг</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ============================================================================
   ECHO RADAR — Foundations: Color + Type
   ----------------------------------------------------------------------------
   Mood: «спокойный диспетчерский центр». Тёмный сине-графитовый фон, холодный
   циан как акцент бренда. Спокойствие как фон, срочность как точка — только
   сигналы severity вспыхивают тёплым: алый «залетает», янтарный «растёт».

   Fonts loaded from Google Fonts CDN (both ship full Cyrillic):
     - Manrope        → UI, headings, body
     - JetBrains Mono → data, metrics, severity, timestamps, eyebrows
   NOTE: not bundled locally. See README → Caveats if you need offline files.
   ============================================================================ */



:root {
  /* ---- Type families ---- */
  --font-sans: 'Manrope', system-ui, -apple-system, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* ====================================================================
     COLOR — Backgrounds (graphite navy, cold + desaturated)
     ==================================================================== */
  --bg-void:    #0A1420;  /* deepest backdrop, behind panels */
  --bg-base:    #0F1E2E;  /* app canvas */
  --bg-raised:  #16293B;  /* large panels / sidebars */
  --surface-1:  #1C3349;  /* cards */
  --surface-2:  #244059;  /* raised cards, inputs */
  --surface-3:  #2F4E6B;  /* hover, pressed surfaces */

  /* ---- Hairlines / borders ---- */
  --line-1:      #243A50;  /* subtle dividers */
  --line-2:      #314A64;  /* card borders */
  --line-strong: #42607E;  /* emphasized borders */

  /* ====================================================================
     COLOR — Text (cool whites → dim)
     ==================================================================== */
  --fg-1: #EAF1F8;  /* primary */
  --fg-2: #97A9BE;  /* secondary */
  --fg-3: #5C6E83;  /* tertiary, dim labels */
  --fg-on-brand: #04141A;  /* ink on cyan */
  --fg-on-warm:  #1A0A09;  /* ink on amber/crimson fills */

  /* ====================================================================
     COLOR — Brand (cold cyan = "всё под контролем", radar signal)
     ==================================================================== */
  --brand:        #2BB3C7;
  --brand-bright: #57D2E2;
  --brand-deep:   #15788A;
  --brand-ghost:  rgba(43,179,199,0.12);
  --brand-line:   rgba(43,179,199,0.32);

  /* ====================================================================
     COLOR — Severity (warm urgency — the "точка" against calm)
     ==================================================================== */
  --sev-critical:        #FF4D5E;  /* «залетает» — crimson */
  --sev-critical-bright: #FF7A87;
  --sev-critical-ghost:  rgba(255,77,94,0.14);
  --sev-critical-line:   rgba(255,77,94,0.38);

  --sev-rising:        #FFB23E;    /* «растёт» — amber */
  --sev-rising-bright: #FFC871;
  --sev-rising-ghost:  rgba(255,178,62,0.14);
  --sev-rising-line:   rgba(255,178,62,0.36);

  --sev-calm:        #34D8A0;       /* «под контролем» / позитив — used sparingly */
  --sev-calm-ghost:  rgba(52,216,160,0.13);
  --sev-calm-line:   rgba(52,216,160,0.34);

  /* ---- Tonality (sentiment) ---- */
  --tone-negative: var(--sev-critical);
  --tone-neutral:  #7E91A6;
  --tone-positive: var(--sev-calm);

  /* ---- Platform marks ---- */
  --pf-instagram: #E1306C;
  --pf-tiktok:    #EAF1F8;

  /* ====================================================================
     RADII
     ==================================================================== */
  --r-xs:   4px;
  --r-sm:   6px;
  --r-md:  10px;
  --r-lg:  14px;
  --r-xl:  20px;
  --r-pill: 999px;

  /* ====================================================================
     SPACING (4px base)
     ==================================================================== */
  --s-1:  4px;
  --s-2:  8px;
  --s-3:  12px;
  --s-4:  16px;
  --s-5:  20px;
  --s-6:  24px;
  --s-8:  32px;
  --s-10: 40px;
  --s-12: 48px;
  --s-16: 64px;
  --s-20: 80px;

  /* ====================================================================
     ELEVATION — shadows on dark + signal glows
     ==================================================================== */
  --shadow-1: 0 1px 2px rgba(0,0,0,0.45);
  --shadow-2: 0 6px 20px -6px rgba(0,0,0,0.55);
  --shadow-3: 0 22px 54px -16px rgba(0,0,0,0.70);

  /* glows = a calm radar pulse or a warm severity flare */
  --glow-brand:    0 0 0 1px var(--brand-line),        0 0 26px -6px rgba(43,179,199,0.50);
  --glow-critical: 0 0 0 1px var(--sev-critical-line),  0 0 24px -4px rgba(255,77,94,0.55);
  --glow-rising:   0 0 0 1px var(--sev-rising-line),    0 0 24px -6px rgba(255,178,62,0.45);

  /* ====================================================================
     MOTION
     ==================================================================== */
  --ease-out:  cubic-bezier(0.22, 1, 0.36, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --dur-fast: 120ms;
  --dur-mid:  220ms;
  --dur-slow: 420ms;

  /* ====================================================================
     TYPE SCALE  (sizes / line-heights / tracking)
     ==================================================================== */
  --display:    700 44px/1.04 var(--font-sans);   --display-ls: -0.022em;
  --h1:         800 34px/1.08 var(--font-sans);   --h1-ls: -0.02em;
  --h2:         700 26px/1.14 var(--font-sans);   --h2-ls: -0.016em;
  --h3:         700 20px/1.22 var(--font-sans);   --h3-ls: -0.012em;
  --h4:         600 16px/1.30 var(--font-sans);   --h4-ls: -0.006em;
  --body-lg:    500 17px/1.55 var(--font-sans);
  --body:       500 15px/1.55 var(--font-sans);
  --small:      500 13px/1.5  var(--font-sans);
  --eyebrow:    600 12px/1.1  var(--font-mono);   --eyebrow-ls: 0.16em;
  --metric:     600 15px/1    var(--font-mono);
  --metric-lg:  600 28px/1    var(--font-mono);   --metric-lg-ls: -0.01em;
  --mono-sm:    500 12px/1.4  var(--font-mono);
}

/* ============================================================================
   SEMANTIC HELPERS — apply directly as classes
   ============================================================================ */
.echo-display { font: var(--display); letter-spacing: var(--display-ls); color: var(--fg-1); }
.echo-h1 { font: var(--h1); letter-spacing: var(--h1-ls); color: var(--fg-1); }
.echo-h2 { font: var(--h2); letter-spacing: var(--h2-ls); color: var(--fg-1); }
.echo-h3 { font: var(--h3); letter-spacing: var(--h3-ls); color: var(--fg-1); }
.echo-h4 { font: var(--h4); letter-spacing: var(--h4-ls); color: var(--fg-1); }
.echo-body-lg { font: var(--body-lg); color: var(--fg-2); }
.echo-body { font: var(--body); color: var(--fg-2); }
.echo-small { font: var(--small); color: var(--fg-3); }

/* eyebrow / label — mono, uppercase, tracked-out: the instrument-panel voice */
.echo-eyebrow {
  font: var(--eyebrow);
  letter-spacing: var(--eyebrow-ls);
  text-transform: uppercase;
  color: var(--fg-3);
}

/* metric — mono tabular numerals for scores, counts, timestamps */
.echo-metric { font: var(--metric); font-variant-numeric: tabular-nums; color: var(--fg-1); }
.echo-metric-lg { font: var(--metric-lg); letter-spacing: var(--metric-lg-ls); font-variant-numeric: tabular-nums; color: var(--fg-1); }

/* ============================================================================
   BASE (optional reset — opt in by adding class "echo" to <body>)
   ============================================================================ */
.echo {
  background: var(--bg-base);
  color: var(--fg-2);
  font: var(--body);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
.echo *,
.echo *::before,
.echo *::after { box-sizing: border-box; }
/* ============================================================================
   Echo Radar — Website kit · styles (consumes tokens from colors_and_type.css)
   ============================================================================ */
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { margin: 0; background: var(--bg-base); color: var(--fg-2); font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased; padding-top: 64px;
  background-image: radial-gradient(900px 480px at 78% -8%, rgba(43,179,199,0.10), transparent 60%); }
a { text-decoration: none; }
::selection { background: var(--brand-line); color: var(--fg-1); }

/* ---- type ---- */
.ws-h1 { font-weight: 800; font-size: 52px; line-height: 1.06; letter-spacing: -0.025em; color: var(--fg-1); }
.ws-h2 { font-weight: 800; font-size: 34px; line-height: 1.12; letter-spacing: -0.02em; color: var(--fg-1); }
.ws-lead { font-size: 17px; line-height: 1.6; color: var(--fg-2); font-weight: 500; }
.ws-accent { color: var(--brand-bright); }

/* ---- buttons ---- */
.ws-btn { display: inline-flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; white-space: nowrap;
  padding: 10px 18px; border-radius: var(--r-md); border: 1px solid transparent; cursor: pointer; transition: filter .12s, transform .12s, border-color .12s; }
.ws-btn:active { transform: scale(.98); }
.ws-btn-lg { padding: 13px 24px; font-size: 15px; }
.ws-btn-primary { background: var(--brand); color: var(--fg-on-brand); box-shadow: var(--glow-brand); }
.ws-btn-primary:hover { filter: brightness(1.08); }
.ws-btn-secondary { background: var(--surface-2); color: var(--fg-1); border-color: var(--line-strong); }
.ws-btn-secondary:hover { border-color: var(--brand-line); }
.ws-btn-ghost { background: transparent; color: var(--fg-1); border-color: var(--line-strong); }
.ws-btn-ghost:hover { background: var(--surface-1); }

/* ---- header ---- */
.ws-header { position: fixed; top: 0; left: 0; right: 0; height: 64px; display: flex; align-items: center; z-index: 40;
  background: rgba(11,18,27,0.72); backdrop-filter: blur(14px); border-bottom: 1px solid var(--line-1); }
.ws-nav { display: flex; gap: 22px; margin-left: 18px; }
.ws-navlink { font-size: 14px; font-weight: 600; color: var(--fg-2); transition: color .12s; white-space: nowrap; }
.ws-navlink:hover { color: var(--fg-1); }

/* ---- sections ---- */
.ws-section { padding: 88px 0; }
.ws-section-alt { background: var(--bg-raised); border-top: 1px solid var(--line-1); border-bottom: 1px solid var(--line-1); }

/* ---- hero ---- */
.ws-hero { padding: 76px 0 84px; }
.ws-livedot { width: 8px; height: 8px; border-radius: 999px; background: var(--brand); box-shadow: 0 0 0 0 var(--brand-line); animation: wspulse 2.4s var(--ease-out) infinite; }
@keyframes wspulse { 0% { box-shadow: 0 0 0 0 rgba(43,179,199,.5); } 70% { box-shadow: 0 0 0 7px rgba(43,179,199,0); } 100% { box-shadow: 0 0 0 0 rgba(43,179,199,0); } }
.ws-trust { display: flex; gap: 22px; margin-top: 26px; flex-wrap: wrap; }
.ws-trust > span { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--fg-2); }

/* ---- hero scope ---- */
.ws-scope { position: relative; aspect-ratio: 1 / 0.92; border-radius: var(--r-xl); overflow: hidden;
  background: radial-gradient(circle at 50% 46%, rgba(43,179,199,0.10), transparent 62%), var(--bg-void);
  border: 1px solid var(--line-2); box-shadow: var(--shadow-3); }
.ws-scope-rings { position: absolute; inset: 0; }
.ws-scope-rings span { position: absolute; left: 50%; top: 46%; transform: translate(-50%,-50%); border-radius: 50%; border: 1px solid rgba(43,179,199,0.16); }
.ws-scope-rings span:nth-child(1) { width: 22%; height: 22%; }
.ws-scope-rings span:nth-child(2) { width: 46%; height: 46%; }
.ws-scope-rings span:nth-child(3) { width: 72%; height: 72%; }
.ws-scope-rings span:nth-child(4) { width: 100%; height: 100%; }
.ws-scope-sweep { position: absolute; left: 50%; top: 46%; width: 86%; height: 86%; transform: translate(-50%,-50%);
  border-radius: 50%; background: conic-gradient(from 0deg, rgba(43,179,199,0.26), transparent 26%); animation: wssweep 7s linear infinite; }
@keyframes wssweep { to { transform: translate(-50%,-50%) rotate(360deg); } }
.ws-scope-blip { position: absolute; width: 9px; height: 9px; border-radius: 50%; background: var(--sev-critical); box-shadow: 0 0 12px 2px rgba(255,77,94,.7); }
.ws-scope-blip.ws-amber { background: var(--sev-rising); box-shadow: 0 0 12px 2px rgba(255,178,62,.6); }
.ws-scope-blip.ws-cyan { background: var(--brand-bright); box-shadow: 0 0 12px 2px rgba(43,179,199,.6); width: 7px; height: 7px; }
.ws-mini { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 256px;
  background: rgba(21,32,46,0.92); backdrop-filter: blur(8px); border: 1px solid var(--line-2);
  border-left: 3px solid var(--sev-critical); border-radius: var(--r-lg); padding: 13px 14px; box-shadow: var(--shadow-3); }
.ws-mini-pf { width: 28px; height: 28px; border-radius: 7px; background: #0A1420; display: grid; place-items: center; flex: none; }
.ws-mini-sev { font-family: var(--font-mono); font-weight: 700; font-size: 22px; color: var(--sev-critical-bright); }
.ws-mini-tag { display: inline-flex; align-items: center; gap: 7px; margin-top: 11px; font-family: var(--font-mono);
  font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--sev-critical-bright); }
.ws-blip { width: 7px; height: 7px; border-radius: 999px; background: var(--sev-critical); box-shadow: 0 0 8px 1px rgba(255,77,94,.8); }

/* ---- stakes curve ---- */
.ws-curve { position: relative; height: 280px; border: 1px solid var(--line-2); border-radius: var(--r-xl);
  background: linear-gradient(180deg, var(--surface-1), var(--bg-base)); overflow: hidden; }
.ws-curve-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
.ws-mark { position: absolute; display: flex; flex-direction: column; align-items: flex-start; }
.ws-mark-dot { width: 12px; height: 12px; border-radius: 50%; margin-bottom: 8px; }
.ws-mark-dot.ws-cyan { background: var(--brand-bright); box-shadow: 0 0 0 5px var(--brand-ghost), 0 0 14px 2px rgba(43,179,199,.5); }
.ws-mark-dot.ws-crimson { background: var(--sev-critical); box-shadow: 0 0 0 5px var(--sev-critical-ghost), 0 0 14px 2px rgba(255,77,94,.5); }
.ws-mark-card { background: rgba(21,32,46,0.95); border: 1px solid var(--brand-line); border-radius: var(--r-md); padding: 10px 13px; width: 200px; }
.ws-mark-card-late { border-color: var(--sev-critical-line); }
.ws-mark-t { font-family: var(--font-mono); font-size: 13px; color: var(--fg-1); font-weight: 600; margin-top: 5px; }
.ws-mark-s { font-size: 12px; color: var(--fg-3); margin-top: 3px; }
.ws-mark-late { align-items: flex-end; }
.ws-mark-late .ws-mark-card { text-align: right; }

/* ---- pipeline ---- */
.ws-pipe { display: flex; align-items: stretch; gap: 4px; }
.ws-pipe-step { flex: 1; background: var(--surface-1); border: 1px solid var(--line-2); border-radius: var(--r-lg); padding: 20px 16px; }
.ws-pipe-ic { width: 42px; height: 42px; border-radius: 11px; background: var(--brand-ghost); border: 1px solid var(--brand-line); display: grid; place-items: center; margin-bottom: 14px; }
.ws-pipe-t { font-size: 16px; font-weight: 700; color: var(--fg-1); margin-bottom: 7px; }
.ws-pipe-d { font-size: 13px; line-height: 1.5; color: var(--fg-3); }
.ws-pipe-arrow { display: grid; place-items: center; flex: none; }

/* ---- severity ---- */
.ws-sev-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
.ws-sev-card { background: var(--surface-1); border: 1px solid var(--line-2); border-radius: var(--r-xl); padding: 26px 22px; text-align: center; }

/* ---- platforms ---- */
.ws-pf-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; flex: 1 1 360px; min-width: 320px; }
.ws-pf-card { background: var(--surface-1); border: 1px solid var(--line-2); border-radius: var(--r-lg); padding: 18px; }
.ws-pf-st { font-family: var(--font-mono); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--fg-3); margin-top: 5px; }
.ws-pf-st.ws-live { color: var(--brand-bright); }

/* ---- trust ---- */
.ws-trust-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
.ws-trust-card { background: var(--surface-1); border: 1px solid var(--line-2); border-radius: var(--r-xl); padding: 24px; }
.ws-trust-ic { width: 44px; height: 44px; border-radius: 12px; background: var(--brand-ghost); border: 1px solid var(--brand-line); display: grid; place-items: center; margin-bottom: 16px; }
.ws-trust-t { font-size: 17px; font-weight: 700; color: var(--fg-1); margin-bottom: 9px; }
.ws-trust-d { font-size: 14px; line-height: 1.6; color: var(--fg-3); }

/* ---- pricing ---- */
.ws-price-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; align-items: stretch; }
.ws-price-card { position: relative; display: flex; flex-direction: column; background: var(--surface-1); border: 1px solid var(--line-2); border-radius: var(--r-xl); padding: 26px 22px; }
.ws-price-hot { border-color: var(--brand-line); box-shadow: var(--glow-brand); background: linear-gradient(180deg, rgba(43,179,199,0.06), var(--surface-1)); }
.ws-price-badge { position: absolute; top: -11px; left: 22px; font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; font-weight: 700; color: var(--fg-on-brand); background: var(--brand); padding: 4px 10px; border-radius: 999px; }
.ws-price-name { font-size: 15px; font-weight: 700; color: var(--brand-bright); }
.ws-price-amount { display: flex; align-items: baseline; gap: 6px; margin: 12px 0 4px; }
.ws-price-amount span { font-family: var(--font-mono); font-size: 30px; font-weight: 700; color: var(--fg-1); white-space: nowrap; }
.ws-price-amount em { font-style: normal; font-size: 14px; color: var(--fg-3); }
.ws-price-limit { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; color: var(--fg-2); padding-bottom: 18px; border-bottom: 1px solid var(--line-1); margin-bottom: 18px; }
.ws-price-feats { display: flex; flex-direction: column; gap: 11px; margin-bottom: 24px; }
.ws-price-feat { display: flex; align-items: flex-start; gap: 9px; font-size: 13.5px; color: var(--fg-2); line-height: 1.4; }

/* ---- cta band ---- */
.ws-cta { position: relative; padding: 96px 0; overflow: hidden; border-top: 1px solid var(--line-1);
  background: radial-gradient(700px 360px at 50% 120%, rgba(43,179,199,0.12), transparent 60%), var(--bg-raised); }
.ws-cta-scope { position: absolute; left: 50%; bottom: -260px; transform: translateX(-50%); pointer-events: none; }
.ws-cta-scope span { position: absolute; left: 50%; bottom: 0; transform: translateX(-50%); border-radius: 50%; border: 1px solid rgba(43,179,199,0.12); }
.ws-cta-scope span:nth-child(1) { width: 360px; height: 360px; }
.ws-cta-scope span:nth-child(2) { width: 560px; height: 560px; }
.ws-cta-scope span:nth-child(3) { width: 760px; height: 760px; }

/* ---- footer ---- */
.ws-footer { padding: 56px 0 40px; border-top: 1px solid var(--line-1); }
.ws-foot-h { font-size: 13px; font-weight: 700; color: var(--fg-1); margin-bottom: 14px; }
.ws-foot-link { display: block; font-size: 13.5px; color: var(--fg-3); margin-bottom: 9px; transition: color .12s; }
.ws-foot-link:hover { color: var(--brand-bright); }

@media (max-width: 920px) {
  .ws-h1 { font-size: 38px; }
  .ws-hero .ws-h1 + * { } 
}

</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

/* ===== icons ===== */
// ============================================================================
// Echo Radar — App UI kit · icons (Lucide path data) + platform glyphs + logo
// ============================================================================

const STROKE_ICONS = {
  inbox: '<polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>',

function Icon({ name, size = 18, stroke = 2, color, style, className }) {
  const base = { width: size, height: size, color, ...(style || {}) };
  if (FILL_ICONS[name]) {
    return <svg viewBox="0 0 24 24" fill="currentColor" className={className} style={base}
      dangerouslySetInnerHTML={{ __html: FILL_ICONS[name] }} />;
  }
  return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={stroke}
    strokeLinecap="round" strokeLinejoin="round" className={className} style={base}
    dangerouslySetInnerHTML={{ __html: STROKE_ICONS[name] || '' }} />;
}

function WsRing({ value, color, bright, label, note }) {
  const size = 96, stroke = 9, r = (size - stroke) / 2, c = 2 * Math.PI * r;
  return (
    <div className="ws-sev-card">
      <span style={{ position: 'relative', display: 'inline-grid', placeItems: 'center', width: size, height: size }}>

          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
            strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c * (1 - value/100)} />
        </svg>
        <span style={{ position: 'absolute', fontFamily: 'var(--font-mono)', fontWeight: 700, fontSize: 30, color: bright, fontVariantNumeric: 'tabular-nums' }}>{value}</span>
